# Kafka broker lokal (single-node, KRaft mode - tanpa Zookeeper)
# Jalankan dengan: docker compose -f docker-compose-kafka.yml up -d
# Broker akan tersedia di: localhost:9092
#
# Untuk membuat topic uji secara manual:
#   docker exec -it kafka-broker kafka-topics.sh --create --topic test-topic \
#     --bootstrap-server localhost:9092 --partitions 1 --replication-factor 1
#
# Untuk mengirim pesan uji manual (opsional, atau gunakan kafka-test-producer.py):
#   docker exec -it kafka-broker kafka-console-producer.sh --topic test-topic \
#     --bootstrap-server localhost:9092

version: '3.8'

services:
  kafka:
    image: bitnami/kafka:3.7
    container_name: kafka-broker
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka_data:/bitnami/kafka

volumes:
  kafka_data:
    driver: local
